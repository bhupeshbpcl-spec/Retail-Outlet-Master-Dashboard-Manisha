const tableBody = document.querySelector("#roTable tbody");
const searchBox = document.getElementById("searchBox");
const details = document.getElementById("details");
const quickStats = document.getElementById("quickStats");

function updateStats() {
    const active = data.filter(d => d.status.toLowerCase() === 'active').length;
    const suspended = data.filter(d => d.status.toLowerCase() === 'suspended').length;
    const initial = data.filter(d => d.status.toLowerCase() === 'initial').length;
    quickStats.innerHTML = `
        <span class="text-emerald-600">Active: ${active}</span>
        <span class="text-rose-600">Suspended: ${suspended}</span>
        <span class="text-amber-600">Initial: ${initial}</span>
    `;
}

function getStatusBadge(status) {
    const s = status.toLowerCase();
    if (s === 'active') return '<span class="px-4 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-widest">Active</span>';
    if (s === 'suspended') return '<span class="px-4 py-1.5 bg-rose-50 text-rose-600 rounded-full text-[10px] font-black uppercase tracking-widest">Suspended</span>';
    return '<span class="px-4 py-1.5 bg-amber-50 text-amber-600 rounded-full text-[10px] font-black uppercase tracking-widest">Initial</span>';
}

function loadTable(filter = "") {
    tableBody.innerHTML = "";
    const lowerFilter = filter.toLowerCase();
    data.filter(r => 
        r.busloc.includes(lowerFilter) || 
        r.name.toLowerCase().includes(lowerFilter) || 
        r.city.toLowerCase().includes(lowerFilter)
    ).forEach(r => {
        let row = document.createElement("tr");
        row.className = "hover:bg-white/80 cursor-pointer transition-all border-b border-slate-50/50";
        row.innerHTML = `<td class="px-6 py-5 font-mono font-bold text-blue-600 text-sm">${r.busloc}</td>
                         <td class="px-6 py-5 font-semibold text-slate-700">${r.name}</td>
                         <td class="px-6 py-5 text-slate-400 font-medium">${r.city}</td>`;
        row.onclick = () => showDetails(r);
        tableBody.appendChild(row);
    });
}

function showDetails(r) {
    let mapLink = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lon}`;
    let hasCoords = !(r.lat === "0" || !r.lat);

    details.innerHTML = `
        <div class="bg-white rounded-[2rem] p-10 shadow-2xl border border-white animate-in fade-in slide-in-from-bottom-8 duration-500">
            <div class="flex flex-col md:flex-row justify-between items-start mb-10 gap-8">
                <div class="flex-1">
                    <div class="mb-4">${getStatusBadge(r.status)}</div>
                    <h2 class="serif-font text-4xl text-slate-900 leading-tight mb-4">${r.descr}</h2>
                    <p class="text-slate-400 font-light text-lg italic"><i class="fa-solid fa-map-pin mr-2 text-yellow-500"></i> ${r.street}, ${r.city}</p>
                </div>
                ${hasCoords ? `<a href="${mapLink}" target="_blank" class="bpcl-bg-blue text-white px-12 py-5 rounded-full font-bold shadow-2xl shadow-blue-200 hover:scale-105 active:scale-95 transition-all flex items-center justify-center space-x-3 w-full md:w-auto">
                    <i class="fa-solid fa-paper-plane"></i> <span>Navigate</span>
                </a>` : ''}
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-slate-50/50 p-6 rounded-2xl border border-slate-100"><p class="text-[9px] uppercase font-black text-slate-400 mb-2">Customer Code</p><p class="font-bold text-slate-800">${r.cust || 'N/A'}</p></div>
                <div class="bg-slate-50/50 p-6 rounded-2xl border border-slate-100"><p class="text-[9px] uppercase font-black text-slate-400 mb-2">Trading Area</p><p class="font-bold text-slate-800">${r.area}</p></div>
                <div class="bg-slate-50/50 p-6 rounded-2xl border border-slate-100"><p class="text-[9px] uppercase font-black text-slate-400 mb-2">Market Class</p><p class="font-bold text-slate-800">${r.market}</p></div>
                <div class="bg-slate-50/50 p-6 rounded-2xl border border-slate-100"><p class="text-[9px] uppercase font-black text-slate-400 mb-2">Comm. Date</p><p class="font-bold text-slate-800">${r.date || 'Pending'}</p></div>
            </div>
        </div>
    `;
    setTimeout(() => details.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

searchBox.addEventListener("input", (e) => loadTable(e.target.value));
updateStats();
loadTable();
</script>
